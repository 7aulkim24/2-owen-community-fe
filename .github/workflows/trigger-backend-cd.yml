name: Trigger Backend CD

on:
  workflow_run:
    workflows:
      - Frontend CI
    types:
      - completed

jobs:
  dispatch:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger backend repository dispatch
        env:
          GH_TOKEN: ${{ secrets.BE_REPO_DISPATCH_TOKEN }}
          OWNER: ${{ vars.BE_REPO_OWNER }}
          REPO: ${{ vars.BE_REPO_NAME }}
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          API_URL="https://api.github.com/repos/${OWNER}/${REPO}/dispatches"
          curl -fsS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "$API_URL" \
            -d "{\"event_type\":\"frontend-main-updated\",\"client_payload\":{\"frontend_sha\":\"${SHA}\"}}"
