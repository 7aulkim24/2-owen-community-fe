<!DOCTYPE html>
<html class="dark" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prooflog</title>
    <link rel="icon" type="image/png" href="../../assets/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/tailwind.css">
    <link rel="stylesheet" href="../../css/common.css">
    <link rel="stylesheet" href="../../css/pages/posts.css">
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { background-color: #10141a; color: #dfe2eb; }
    </style>
</head>
<body class="min-h-screen pb-24 md:pb-0 font-sans antialiased">
    <header id="header" class="!bg-[#10141a] border-b border-[#414752]/40 sticky top-0 z-50 shadow-[0_1px_0_rgba(163,201,255,0.06)]">
        <div class="app-header-inner flex justify-between items-center px-4 sm:px-6 py-3 w-full max-w-[var(--max-width)] mx-auto">
            <a href="../../posts.html" class="text-xl font-black text-[#a3c9ff] tracking-tighter shrink-0">Prooflog</a>
            <nav class="hidden md:flex items-center gap-6">
                <a class="text-[#a3c9ff] font-bold text-base rounded-lg px-3 py-1.5 ring-1 ring-inset ring-[#a3c9ff]/35 bg-[#262a31]/80" href="../../posts.html">Feed</a>
                <a class="text-[#c0c7d4] hover:bg-[#353940] transition-colors duration-200 font-bold text-base px-3 py-1.5 rounded-lg" href="../../draft-review.html">Records</a>
            </nav>
            <div class="flex items-center gap-3">
                <div class="profile-icon relative" id="header-profile-btn">
                    <img loading="lazy" src="../../assets/default-profile.png" alt="" id="header-profile-img" class="w-10 h-10 rounded-full object-cover border border-[#414752]/40">
                    <div class="profile-dropdown" id="profile-dropdown">
                        <a href="../profile/edit-profile.html">회원정보수정</a>
                        <a href="../profile/edit-password.html">비밀번호수정</a>
                        <a href="../integration/manage.html">연동 관리</a>
                        <a href="#" id="logout-link">로그아웃</a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main id="app" class="app-main">
        <section class="welcome-section">
            <h1 class="welcome-title">Prooflog</h1>
            <p class="welcome-sub">검증된 작업 기록 · 피드</p>
        </section>

        <section id="post-list-container">
            <div class="filter-row">
                <div class="filter-tabs" id="filter-tabs">
                    <button type="button" class="filter-tab active" data-type="all">전체</button>
                    <button type="button" class="filter-tab" data-type="manual">수동 작성</button>
                    <button type="button" class="filter-tab" data-type="auto_log">자동 로그</button>
                    <button type="button" class="filter-tab" data-type="weekly_digest">주간 회고</button>
                </div>
            </div>
            <div id="post-list"></div>
            <div id="infinite-scroll-sentinel" class="h-4 w-full" aria-hidden="true"></div>
        </section>
    </main>

    <button type="button" id="btn-create-post" class="fab-create fixed bottom-24 right-5 md:bottom-8 md:right-8 w-14 h-14 rounded-full flex items-center justify-center z-50 transition-transform" aria-label="게시글 작성">
        <span class="material-symbols-outlined text-[28px] font-bold">add</span>
    </button>

    <nav class="md:hidden fixed bottom-0 left-0 w-full flex justify-around items-center px-3 pt-2 bg-[#10141a]/90 backdrop-blur-xl border-t border-[#414752]/30 z-40" style="padding-bottom: max(1.25rem, env(safe-area-inset-bottom));" aria-label="주요 메뉴">
        <a class="flex flex-col items-center justify-center bg-[#57a5ff] text-[#001c39] rounded-xl p-2 min-w-[3.5rem]" href="../../posts.html">
            <span class="material-symbols-outlined text-[22px]">grid_view</span>
            <span class="font-label text-[10px] uppercase tracking-widest mt-0.5">Feed</span>
        </a>
        <a class="flex flex-col items-center justify-center text-[#c0c7d4] p-2 hover:text-[#a3c9ff] transition-colors" href="../../draft-review.html">
            <span class="material-symbols-outlined text-[22px]">history_edu</span>
            <span class="font-label text-[10px] uppercase tracking-widest mt-0.5">Records</span>
        </a>
        <a class="flex flex-col items-center justify-center text-[#c0c7d4] p-2 hover:text-[#a3c9ff] transition-colors" href="../integration/manage.html">
            <span class="material-symbols-outlined text-[22px]">link</span>
            <span class="font-label text-[10px] uppercase tracking-widest mt-0.5">연동</span>
        </a>
        <a class="flex flex-col items-center justify-center text-[#c0c7d4] p-2 hover:text-[#a3c9ff] transition-colors" href="../profile/edit-profile.html">
            <span class="material-symbols-outlined text-[22px]">account_circle</span>
            <span class="font-label text-[10px] uppercase tracking-widest mt-0.5">Profile</span>
        </a>
    </nav>

    <script type="module" src="../../js/pages/posts.js"></script>
</body>
</html>
